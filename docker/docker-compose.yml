services:
  fb-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fb-manager
    ports:
      - "8000:8000"
    environment:
      # 在此处设置您的强密码环境变量
      - ADMIN_PASSWORD=G8#vK2$mP9*zL4!xQ7@nW3&yB5^
      - TZ=Asia/Shanghai
    volumes:
      # 持久化数据库
      - ../data:/app/data
      # 持久化并方便宿主机查看日志
      - ../logs:/app/logs
    restart: unless-stopped
