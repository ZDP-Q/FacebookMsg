services:
  fb-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fb-manager
    ports:
      # 允许外部通过服务器 IP 访问
      - "8000:8000"
    environment:
      # 使用不含特殊字符的稳健强密码
      - ADMIN_PASSWORD=GeminiManager2026
      - TZ=Asia/Shanghai
    volumes:
      # 持久化数据库
      - ../data:/app/data
      # 持久化并方便宿主机查看日志
      - ../logs:/app/logs
    restart: unless-stopped
