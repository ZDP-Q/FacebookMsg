services:
  fbi-manager:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fbimanager
    ports:
      # 允许外部通过服务器 IP 访问
      - "38000:38000"
    environment:
      - TZ=Asia/Shanghai
    volumes:
      # 持久化数据库
      - ../data:/app/data
      # 持久化并方便宿主机查看日志
      - ../logs:/app/logs
      # 挂载提示词模板
      - ../prompts:/app/prompts
      # 挂载应用代码、模板和静态资源，实现开发时实时同步
      - ../app:/app/app
      - ../templates:/app/templates
      - ../static:/app/static
    restart: unless-stopped
