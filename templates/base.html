<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Facebook 互动管理{% endblock %} — FBManager</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
<div class="app-shell">
    <!-- Sidebar -->
    <aside class="sidebar" id="app-sidebar">
        <div class="sidebar-header">
            <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="切换导航栏">
                <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M2 3h12v2H2V3zm0 4h12v2H2V7zm0 4h12v2H2v-2z"/></svg>
            </button>
            <div class="brand">
                <div class="brand-icon">FB</div>
                <div>
                    <div class="brand-name">FB Manager</div>
                    <div class="brand-sub">互动管理台</div>
                </div>
            </div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section-label">主菜单</div>
            <a href="/" class="nav-item {% block nav_home %}{% endblock %}">
                <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1L1 7v8h5v-4h4v4h5V7L8 1z"/></svg>
                <span class="nav-text">概览</span>
            </a>
            <a href="/comments" class="nav-item {% block nav_comments %}{% endblock %}">
                <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M14 1H2a1 1 0 00-1 1v9a1 1 0 001 1h3l3 3 3-3h3a1 1 0 001-1V2a1 1 0 00-1-1zM4 6h8v1H4V6zm0 2h5v1H4V8zm0-4h8v1H4V4z"/></svg>
                <span class="nav-text">内容中心</span>
            </a>
            <a href="/monitors" class="nav-item {% block nav_monitors %}{% endblock %}">
                <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M1 3a1 1 0 011-1h12a1 1 0 011 1v8a1 1 0 01-1 1H9l1 2H6l1-2H2a1 1 0 01-1-1V3zm1 0v8h12V3H2zm1 1h10v1H3V4zm0 2h10v1H3V6zm0 2h6v1H3V8z"/></svg>
                <span class="nav-text">帖子监控</span>
            </a>
            <a href="/chats" class="nav-item {% block nav_chats %}{% endblock %}">
                <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M15.964.686a.5.5 0 00-.65-.65L.767 5.855a.75.75 0 00-.124 1.329l4.993 3.11 3.11 4.993a.75.75 0 001.329-.124L15.964.686zm-7.033 8.242L4.47 6.767l10.286-4.032-4.032 10.286-2.193-4.522z"/></svg>
                <span class="nav-text">私信管理</span>
            </a>
            <a href="/personas" class="nav-item {% block nav_personas %}{% endblock %}">
                <svg class="nav-icon" viewBox="0 0 16 16" fill="currentColor"><path d="M8 8a3 3 0 100-6 3 3 0 000 6zm2-3a2 2 0 11-4 0 2 2 0 014 0zm4 8c0 1-1 1-1 1H3s-1 0-1-1 1-4 6-4 6 3 6 4zm-1-.004c-.001-.246-.154-.986-.832-1.664C11.516 10.68 10.289 10 8 10c-2.29 0-3.516.68-4.168 1.332-.678.678-.83 1.418-.832 1.664h10z"/></svg>
                <span class="nav-text">人设管理</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <label for="sidebar-account-select" class="sidebar-field-label">当前账号</label>
            <select id="sidebar-account-select" class="sidebar-select"></select>
            <form method="post" action="/logout">
                <button type="submit" class="btn btn-secondary btn-sm sidebar-logout">退出登录</button>
            </form>
            <div class="sidebar-version">FBIManager v2.0</div>
        </div>
    </aside>
    <!-- Main -->
    <div class="main-content">
        <div class="page-area">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>
<script src="/static/js/base.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
